services:

  # ─── App (PHP-FPM) ──────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file: .env
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aipal

  # ─── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - storage:/var/www/html/storage:ro
    depends_on:
      - app
    networks:
      - aipal

  # ─── PostgreSQL + pgvector ───────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-aipal}
      POSTGRES_USER: ${DB_USERNAME:-aipal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-aipal}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aipal

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - aipal

  # ─── Horizon (queue worker) ──────────────────────────────────────────────────
  horizon:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: ["php", "artisan", "horizon"]
    env_file: .env
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aipal

  # ─── Scheduler ──────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    env_file: .env
    volumes:
      - storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aipal

  # ─── Ollama (optional — local LLM for offline use / Raspberry Pi) ────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama:/root/.ollama
    networks:
      - aipal
    profiles:
      - ollama

volumes:
  postgres:
  redis:
  storage:
  ollama:

networks:
  aipal:
    driver: bridge
