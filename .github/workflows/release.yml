name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Docker release images ─────────────────────────────────────────────────
  docker:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          target: production
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: docker
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Docker Images

            ```bash
            # Latest
            docker pull ghcr.io/${{ github.repository }}:latest

            # This release
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            Works on **amd64** (VPS / laptop) and **arm64** (Raspberry Pi 4/5).

            ## Quick Start

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd aiPal
            cp .env.example .env
            # Edit .env — set AI provider keys and APP_KEY
            docker compose up -d
            docker compose exec app php artisan key:generate
            docker compose exec app php artisan migrate
            ```

            See [README.md](https://github.com/${{ github.repository }}#readme) for full setup instructions.
